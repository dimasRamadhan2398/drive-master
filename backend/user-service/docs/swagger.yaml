basePath: /api/v1
definitions:
  dto.AddCoverageAreaInput:
    properties:
      areaName:
        minLength: 2
        type: string
    required:
    - areaName
    type: object
  dto.CreateUserRequest:
    properties:
      address:
        type: string
      dateOfBirth:
        type: string
      emailAddress:
        type: string
      image:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      phoneNumber:
        minLength: 10
        type: string
      roleId:
        type: integer
      username:
        minLength: 2
        type: string
    required:
    - dateOfBirth
    - emailAddress
    - image
    - password
    - phoneNumber
    - roleId
    - username
    type: object
  dto.CreateWorkExperienceRequest:
    properties:
      companyName:
        type: string
      description:
        type: string
      endDate:
        type: string
      role:
        type: string
      startDate:
        type: string
    required:
    - companyName
    - role
    - startDate
    type: object
  dto.ForgotPasswordInput:
    properties:
      emailAddress:
        type: string
    required:
    - emailAddress
    type: object
  dto.LoginInput:
    properties:
      email:
        description: accepts either email or username
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RegisterRequest:
    properties:
      confirmPassword:
        type: string
      dateOfBirth:
        example: "1999-08-25"
        format: date
        type: string
      email:
        type: string
      name:
        type: string
      password:
        type: string
      phoneNumber:
        type: string
      roleId:
        type: integer
      username:
        type: string
    required:
    - confirmPassword
    - dateOfBirth
    - email
    - name
    - password
    - phoneNumber
    - username
    type: object
  dto.ResendOTPInput:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.ResetPasswordInput:
    properties:
      newPassword:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - newPassword
    - token
    type: object
  dto.UpdateInstructorProfileInput:
    properties:
      bnspCertificateNumber:
        minLength: 10
        type: string
      description:
        type: string
      licenseExpiry:
        type: string
      licenseNumber:
        minLength: 5
        type: string
      yearsOfExperience:
        minimum: 0
        type: integer
    type: object
  dto.UpdateUserRequest:
    properties:
      address:
        type: string
      dateOfBirth:
        type: string
      emailAddress:
        type: string
      image:
        type: string
      password:
        minLength: 8
        type: string
      phoneNumber:
        minLength: 10
        type: string
      roleId:
        type: integer
      username:
        minLength: 2
        type: string
    type: object
  dto.UploadBase64MediaRequest:
    properties:
      base64Data:
        type: string
      fileName:
        type: string
      folder:
        type: string
    required:
    - base64Data
    type: object
  dto.VerifyOTPInput:
    properties:
      email:
        type: string
      otp:
        type: string
    required:
    - email
    - otp
    type: object
  response.ErrorDetail:
    properties:
      code:
        type: string
      details:
        type: string
      message:
        type: string
    type: object
  response.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.ErrorDetail'
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8001
info:
  contact: {}
  description: API documentation for User Service
  title: User Service API
  version: "1.0"
paths:
  /auth/confirm-reset-password:
    post:
      consumes:
      - application/json
      description: Reset password using token from email
      parameters:
      - description: Reset password data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successful
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Confirm Reset Password
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Request password reset link sent to email
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: Reset link sent if email exists
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Forgot Password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email/username and password
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/response.Response'
      summary: Login
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account and send OTP for email verification
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Registration successful
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Username or email already exists
          schema:
            $ref: '#/definitions/response.Response'
      summary: Register
      tags:
      - Auth
  /auth/resend-otp:
    post:
      consumes:
      - application/json
      description: Resend OTP to email address for verification
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResendOTPInput'
      produces:
      - application/json
      responses:
        "200":
          description: OTP sent successfully
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Resend OTP
      tags:
      - Auth
  /auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Verify OTP sent to email and mark user as verified
      parameters:
      - description: OTP verification data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyOTPInput'
      produces:
      - application/json
      responses:
        "200":
          description: Email verified successfully
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Invalid or expired OTP
          schema:
            $ref: '#/definitions/response.Response'
      summary: Verify OTP
      tags:
      - Auth
  /instructors:
    get:
      description: Get all instructors with their profiles (paginated)
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 10, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get All Instructors
      tags:
      - Instructors
  /instructors/{id}/coverage-areas:
    get:
      description: Get all coverage areas for an instructor
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get Coverage Areas
      tags:
      - Instructors
    post:
      consumes:
      - application/json
      description: Add coverage area for an instructor
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Coverage area data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddCoverageAreaInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Add Coverage Area
      tags:
      - Instructors
  /instructors/{id}/coverage-areas/{areaId}:
    delete:
      description: Remove coverage area for an instructor
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Coverage Area ID
        in: path
        name: areaId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Remove Coverage Area
      tags:
      - Instructors
  /instructors/{id}/profile:
    get:
      description: Get instructor profile by user ID
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get Instructor Profile
      tags:
      - Instructors
    put:
      consumes:
      - application/json
      description: Update instructor profile
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update profile data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateInstructorProfileInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update Instructor Profile
      tags:
      - Instructors
  /instructors/{id}/work-experiences:
    get:
      description: Get work experience by ID
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get Work Experience
      tags:
      - Instructors
    post:
      consumes:
      - application/json
      description: Add work experience for an instructor
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Work experience data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateWorkExperienceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create Work Experience
      tags:
      - Instructors
  /media/{fileId}:
    delete:
      description: Delete a media file by ID
      parameters:
      - description: File ID
        in: path
        name: fileId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Delete Media
      tags:
      - Media
  /media/{fileId}/metadata:
    get:
      description: Get metadata for a media file
      parameters:
      - description: File ID
        in: path
        name: fileId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get Media Metadata
      tags:
      - Media
  /media/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a file
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: File name
        in: formData
        name: fileName
        type: string
      - description: Folder path
        in: formData
        name: folder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Upload Media
      tags:
      - Media
  /media/upload-base64:
    post:
      consumes:
      - application/json
      description: Upload a file from base64 encoded data
      parameters:
      - description: Base64 encoded file data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UploadBase64MediaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Upload Base64 Media
      tags:
      - Media
  /members/{userId}/profile:
    get:
      description: Get member profile by user ID
      parameters:
      - description: User ID (UUID)
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get Member Profile
      tags:
      - Members
    put:
      consumes:
      - application/json
      description: Update member profile
      parameters:
      - description: User ID (UUID)
        in: path
        name: userId
        required: true
        type: string
      - description: Update profile data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update Member Profile
      tags:
      - Members
  /users:
    get:
      description: Get all users with their profiles
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get All Users
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Create a new user (admin only)
      parameters:
      - description: User data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create User
      tags:
      - Users
  /users/{id}:
    delete:
      description: Delete a user by ID
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Delete User
      tags:
      - Users
    get:
      description: Get a user by their ID with profiles
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get User by ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update user information
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update user data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update User
      tags:
      - Users
  /work-experiences/{expId}:
    delete:
      description: Delete a work experience
      parameters:
      - description: Work Experience ID
        in: path
        name: expId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Delete Work Experience
      tags:
      - Instructors
    put:
      consumes:
      - application/json
      description: Update a work experience
      parameters:
      - description: Work Experience ID
        in: path
        name: expId
        required: true
        type: integer
      - description: Update work experience data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateWorkExperienceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update Work Experience
      tags:
      - Instructors
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
