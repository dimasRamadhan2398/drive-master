basePath: /api/v1
definitions:
  user-service_models_dto.AddCoverageAreaInput:
    properties:
      areaName:
        minLength: 2
        type: string
    required:
      - areaName
    type: object
  user-service_models_dto.ChangePasswordInput:
    properties:
      currentPassword:
        type: string
      newPassword:
        minLength: 8
        type: string
    required:
      - currentPassword
      - newPassword
    type: object
  user-service_models_dto.CreateUserRequest:
    properties:
      address:
        type: string
      dateOfBirth:
        type: string
      emailAddress:
        type: string
      image:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      phoneNumber:
        minLength: 10
        type: string
      roleId:
        type: integer
      username:
        minLength: 2
        type: string
    required:
      - dateOfBirth
      - emailAddress
      - image
      - password
      - phoneNumber
      - roleId
      - username
    type: object
  user-service_models_dto.CreateWorkExperienceRequest:
    properties:
      companyName:
        type: string
      description:
        type: string
      endDate:
        type: string
      role:
        type: string
      startDate:
        type: string
    required:
      - companyName
      - role
      - startDate
    type: object
  user-service_models_dto.ForgotPasswordInput:
    properties:
      emailAddress:
        type: string
    required:
      - emailAddress
    type: object
  user-service_models_dto.LoginInput:
    properties:
      email:
        description: accepts email
        type: string
      password:
        type: string
    required:
      - identifier
      - password
    type: object
  user-service_models_dto.ResetPasswordInput:
    properties:
      newPassword:
        minLength: 8
        type: string
      token:
        type: string
    required:
      - newPassword
      - token
    type: object
  user-service_models_dto.UpdateInstructorProfileInput:
    properties:
      bnspCertificateNumber:
        minLength: 10
        type: string
      description:
        type: string
      licenseExpiry:
        type: string
      licenseNumber:
        minLength: 5
        type: string
      yearsOfExperience:
        minimum: 0
        type: integer
    type: object
  user-service_models_dto.UpdateUserRequest:
    properties:
      address:
        type: string
      dateOfBirth:
        type: string
      emailAddress:
        type: string
      image:
        type: string
      password:
        minLength: 8
        type: string
      phoneNumber:
        minLength: 10
        type: string
      roleId:
        type: integer
      username:
        minLength: 2
        type: string
    type: object
  user-service_models_dto.UploadBase64MediaRequest:
    properties:
      base64Data:
        type: string
      fileName:
        type: string
      folder:
        type: string
    required:
      - base64Data
    type: object
  user-service_pkg_response.ErrorDetail:
    properties:
      code:
        type: string
      details:
        type: string
      message:
        type: string
    type: object
  user-service_pkg_response.Response:
    properties:
      data: {}
      error:
        $ref: "#/definitions/user-service_pkg_response.ErrorDetail"
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8001
info:
  contact: {}
  description: API documentation for User Service
  title: User Service API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
        - application/json
      description: Request a password reset link
      parameters:
        - description: Email address
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/user-service_models_dto.ForgotPasswordInput"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/user-service_pkg_response.Response"
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/user-service_pkg_response.Response"
      summary: Forgot Password
      tags:
        - Auth
  /auth/login:
    post:
      consumes:
        - application/json
      description: Authenticate user with email/username and password
      parameters:
        - description: Login credentials
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/user-service_models_dto.LoginInput"
      produces:
