        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/user-service_pkg_response.Response"
        "401":
          description: Unauthorized
          schema:
            $ref: "#/definitions/user-service_pkg_response.Response"
      summary: Login
      tags:
        - Auth
  /auth/register:
    post:
      consumes:
        - application/json
      description: Create a new user account
      parameters:
        - description: User registration data
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/user-service_models_dto.RegisterRequest"
      produces:
