        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/user-service_pkg_response.Response"
        "409":
          description: Conflict
          schema:
            $ref: "#/definitions/user-service_pkg_response.Response"
      summary: Register
      tags:
        - Auth
  /auth/reset-password:
    post:
