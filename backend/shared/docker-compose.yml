services:
  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: drive_master_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drive_master_network

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: drive_master_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_PORT: 9092
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:29092",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - drive_master_network

  # Kafka UI (optional - for managing/monitoring Kafka)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: drive_master_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      TZ: Asia/Jakarta
      KAFKA_CLUSTERS_0_NAME: drive_master
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - drive_master_network

  # Redis Cache
  redis:
    image: redis:latest
    container_name: drive_master_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-drivemaster123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-drivemaster123}
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-drivemaster123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drive_master_network

  # Redis Insight
  redisinsight:
    image: redis/redisinsight:latest
    container_name: drive_master_redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    networks:
      - drive_master_network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: drive_master_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin_drive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivemaster123}
      POSTGRES_DB: ${POSTGRES_DB:-drivemaster_user_service}
    volumes:
      - drivemaster_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-admin_drive} -d ${POSTGRES_DB:-drivemaster_user_service}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drive_master_network

volumes:
  redis_data:
  zookeeper_data:
  kafka_data:
  postgres_data:
  drivemaster_pg_data:

networks:
  drive_master_network:
    name: drive_master_network
    driver: bridge
    attachable: true
